<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}Course Management System{% endblock %}</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* Global */
body{
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    min-height: 100vh;
}

/* Navbar */
.navbar{
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.7) !important;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

.navbar-brand{
    font-weight: 600;
}

/* Nav links hover */
.nav-link{
    position: relative;
    transition: .3s;
}

.nav-link:hover{
    color: #4f46e5 !important;
}

/* Underline animation */
.nav-link::after{
    content: '';
    width: 0%;
    height: 2px;
    background: #4f46e5;
    position: absolute;
    left: 0;
    bottom: 0;
    transition: .3s;
}

.nav-link:hover::after{
    width: 100%;
}

/* Buttons */
.btn-pill{
    border-radius: 50px;
}

/* Cards (global reusable) */
.app-card{
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: .3s;
}

.app-card:hover{
    transform: translateY(-5px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

/* Page animation */
.container{
    animation: fadeIn .5s ease;
}

@keyframes fadeIn{
    from{
        opacity: 0;
        transform: translateY(15px);
    }
    to{
        opacity: 1;
    }
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container-fluid">

<a class="navbar-brand" href="{% url 'home' %}">
    <i class="fa fa-graduation-cap me-2"></i>Course System
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
    <span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarCollapse">
<ul class="navbar-nav ms-auto align-items-center">

{% if request.user.is_authenticated %}

    <li class="nav-item">
        <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
    </li>

    <li class="nav-item">
        <a class="nav-link" href="{% url 'courses' %}">Courses</a>
    </li>

    {% if not request.user.is_staff %}
    <li class="nav-item">
        <a class="nav-link" href="{% url 'my_courses' %}">My Courses</a>
    </li>
    {% endif %}

    <li class="nav-item ms-2">
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button class="btn btn-danger btn-sm btn-pill">
                Logout
            </button>
        </form>
    </li>

{% else %}

    <li class="nav-item">
        <a class="nav-link" href="{% url 'home' %}">Home</a>
    </li>

    <li class="nav-item">
        <a class="nav-link" href="{% url 'login' %}">Login</a>
    </li>

    <li class="nav-item">
        <a class="btn btn-primary btn-sm btn-pill ms-2" href="{% url 'register' %}">
            Register
        </a>
    </li>

{% endif %}

</ul>
</div>

</div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
