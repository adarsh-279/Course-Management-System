<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Course Management System{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --surface: rgba(255,255,255,0.85);
            --surface-muted: rgba(245,247,255,0.8);
            --text: #111827;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f5f3ff);
            color: var(--text);
            min-height: 100vh;
        }

        .app-wrapper { min-height: 100vh; display: flex; flex-direction: column; }

        .app-navbar {
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .app-navbar .navbar-brand { font-weight: 700; letter-spacing: 0.4px; }
        .app-navbar .nav-link, .app-navbar .btn-outline-light { color: rgba(255,255,255,0.92); }

        .app-card {
            border: 0; border-radius: 16px;
            background: var(--surface);
            box-shadow: 0 14px 32px rgba(20, 28, 60, 0.12);
            padding: 1.4rem;
            margin-bottom: 1rem;
            animation: fadeIn .5s ease;
        }

        .app-card-secondary {
            background: var(--surface-muted);
        }

        .btn-pill { border-radius: 50px; }

        .app-footer { text-align: center; padding: 1rem 0; margin-top: auto; color: #6b7280; font-size: .9rem; }

        .form-control {
            border-radius: 12px;
            border: 1px solid #dbeafe;
            background: #fff;
            box-shadow: inset 0 1px 1px rgba(0,0,0,0.04);
        }

        .card-title { font-weight: 700; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .text-primary, .text-primary a { color: var(--primary) !important; }
    </style>
</head>
<body>
<div class="app-wrapper">
    <nav class="navbar navbar-expand-lg app-navbar px-3 py-2">
        <a class="navbar-brand" href="/">Course Management</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#appNav" aria-controls="appNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="appNav">
            <ul class="navbar-nav ms-auto align-items-center">
                {% block nav_items %}
                {% if user.is_authenticated %}
                    <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'courses' %}">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Logout</a></li>
                {% else %}
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'register' %}">Register</a></li>
                {% endif %}
                {% endblock %}
            </ul>
        </div>
    </nav>

    <main class="py-5 flex-fill">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="app-footer">
        <div>© {{ now|date:'Y' }} Course Management, made with ❤</div>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-..." crossorigin="anonymous"></script>
</body>
</html>
